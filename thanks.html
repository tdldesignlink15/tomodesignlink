<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせありがとうございます — tomo design link</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400&family=Space+Mono:wght@400&family=Dancing+Script:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ─── RESET ─── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ─── TOKENS ─── */
:root {
  --ivory:  #F4F0E8;
  --navy:   #1A2744;
  --sand:   #C8A882;
  --muted:  #6B7A99;
  --white:  #FFFFFF;

  /* spacing scale */
  --sp-xs:  0.5rem;
  --sp-sm:  1rem;
  --sp-md:  1.5rem;
  --sp-lg:  2.5rem;
  --sp-xl:  4rem;
}

/* ─── BASE ─── */
html {
  /* prevent font-size inflation on iOS */
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

body {
  background: var(--ivory);
  color: var(--navy);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  line-height: 1.7;
  min-height: 100svh;          /* fallback */
  min-height: 100dvh;          /* dynamic viewport (handles mobile browser chrome) */
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ─── NAV ─── */
nav {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(1.2rem, 5vw, 2.5rem);
  height: 64px;
  border-bottom: 1px solid rgba(26,39,68,0.07);
  /* sticky so it stays on long pages */
  position: sticky;
  top: 0;
  background: rgba(244,240,232,0.95);
  backdrop-filter: blur(12px);
  z-index: 10;
}

.nav-logo {
  text-decoration: none;
  font-family: 'Dancing Script', cursive;
  font-size: clamp(1.2rem, 3.5vw, 1.5rem);
  font-weight: 500;
  color: var(--navy);
  white-space: nowrap;
}

.nav-back {
  font-family: 'DM Sans', sans-serif;
  font-size: clamp(0.72rem, 2vw, 0.82rem);
  color: var(--muted);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  white-space: nowrap;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--navy); }
.nav-back svg { flex-shrink: 0; }

/* ─── MAIN ─── */
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  /* fluid vertical padding: tight on small screens, generous on large */
  padding: clamp(2.5rem, 8vw, 6rem) clamp(1.2rem, 6vw, 3rem);
  position: relative;
  overflow: hidden;
}

/* decorative blobs — purely visual, don't affect layout */
.blob {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  user-select: none;
}
.blob-1 {
  width: min(600px, 120vw);
  height: min(600px, 120vw);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(200,168,130,0.09) 0%, transparent 68%);
}
.blob-2 {
  width: min(260px, 60vw);
  height: min(260px, 60vw);
  top: -4%; right: -4%;
  background: radial-gradient(circle, rgba(26,39,68,0.05) 0%, transparent 70%);
}

/* ─── CARD ─── */
.thanks-box {
  position: relative;
  z-index: 1;
  text-align: center;
  width: 100%;
  max-width: 560px;
  /* prevent card from touching edges on narrow screens */
  padding: 0 var(--sp-xs);
  animation: fadeUp 0.85s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── CHECK ICON ─── */
.check-wrap {
  width: clamp(56px, 12vw, 76px);
  height: clamp(56px, 12vw, 76px);
  border-radius: 50%;
  border: 1.5px solid var(--sand);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto var(--sp-lg);
  animation: scaleIn 0.55s 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.6); }
  to   { opacity: 1; transform: scale(1); }
}
.check-wrap svg {
  stroke: var(--sand);
  /* scale icon with circle */
  width: clamp(20px, 5vw, 30px);
  height: auto;
}

/* ─── LABEL ─── */
.thanks-label {
  font-family: 'Space Mono', monospace;
  font-size: clamp(0.52rem, 1.6vw, 0.62rem);
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--sand);
  margin-bottom: var(--sp-md);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  /* prevent label from overflowing on very small screens */
  flex-wrap: wrap;
}
.thanks-label::before,
.thanks-label::after {
  content: '';
  display: block;
  width: clamp(16px, 4vw, 28px);
  height: 1px;
  background: var(--sand);
  opacity: 0.55;
  flex-shrink: 0;
}

/* ─── HEADING ─── */
.thanks-heading {
  font-family: 'Cormorant Garamond', serif;
  /* fluid: never too small on mobile, never too large on wide screens */
  font-size: clamp(1.9rem, 6vw, 3.6rem);
  font-weight: 300;
  line-height: 1.18;
  color: var(--navy);
  margin-bottom: clamp(0.8rem, 2vw, 1.4rem);
  /* wrap gracefully */
  word-break: keep-all;
  white-space: normal;
}
.thanks-heading em {
  font-style: italic;
  color: var(--muted);
}

/* ─── BODY TEXT ─── */
.thanks-body {
  font-size: clamp(0.82rem, 2.2vw, 0.9rem);
  color: var(--muted);
  line-height: 1.95;
  margin-bottom: clamp(1.8rem, 5vw, 3rem);
}
/* hide <br> on very narrow screens so text reflows naturally */
@media (max-width: 360px) {
  .thanks-body br { display: none; }
}

/* ─── BUTTONS ─── */
.thanks-btns {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary,
.btn-secondary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.45rem;
  padding: 0.78rem 1.6rem;
  border-radius: 50px;
  font-family: 'DM Sans', sans-serif;
  font-size: clamp(0.78rem, 2vw, 0.85rem);
  font-weight: 400;
  text-decoration: none;
  white-space: nowrap;
  transition: opacity 0.2s, border-color 0.2s;
  /* prevent buttons shrinking weirdly */
  flex-shrink: 0;
}

.btn-primary {
  background: var(--navy);
  color: white;
  border: 1px solid var(--navy);
}
.btn-primary:hover { opacity: 0.75; }

.btn-secondary {
  background: transparent;
  color: var(--navy);
  border: 1px solid rgba(26,39,68,0.25);
}
.btn-secondary:hover { border-color: var(--navy); }

/* on very small screens, stack buttons full-width */
@media (max-width: 360px) {
  .thanks-btns { flex-direction: column; }
  .btn-primary, .btn-secondary { width: 100%; }
}

/* ─── DIVIDER & SIGN ─── */
.thanks-divider {
  width: 44px;
  height: 1px;
  background: var(--sand);
  opacity: 0.35;
  margin: clamp(2rem, 5vw, 3rem) auto;
}

.thanks-sign {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(1.1rem, 3vw, 1.4rem);
  color: var(--navy);
  opacity: 0.45;
}

/* ─── FOOTER ─── */
footer {
  flex-shrink: 0;
  text-align: center;
  padding: 1.2rem clamp(1rem, 4vw, 2rem);
  font-family: 'Space Mono', monospace;
  font-size: clamp(0.5rem, 1.4vw, 0.6rem);
  letter-spacing: 0.1em;
  color: rgba(26,39,68,0.28);
  border-top: 1px solid rgba(26,39,68,0.07);
}

/* ─── TABLET tweaks (641px – 1024px) ─── */
@media (min-width: 641px) and (max-width: 1024px) {
  .thanks-box { padding: 0; }
}

/* ─── LARGE SCREEN tweaks (1280px+) ─── */
@media (min-width: 1280px) {
  main { padding-top: 7rem; padding-bottom: 7rem; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">tomo design link</a>
  <a href="index.html" class="nav-back">
    <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
      <path d="M14 5H2M6 1L2 5L6 9" stroke="currentColor" stroke-width="1.2"/>
    </svg>
    トップへ戻る
  </a>
</nav>

<!-- MAIN -->
<main>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="thanks-box">

    <div class="check-wrap">
      <svg viewBox="0 0 28 22" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 11L10 19L26 2"/>
      </svg>
    </div>

    <p class="thanks-label">Message Received</p>

    <h1 class="thanks-heading">
      ありがとうございます。
    </h1>

    <p class="thanks-body">
      お問い合わせいただきありがとうございます。<br>
      内容を確認の上、2〜3営業日以内にご返信致します。<br><br>
      しばらくお待ちいただけますと幸いです。<br>
      引き続き、どうぞよろしくお願いいたします。
    </p>

    <div class="thanks-btns">
      <a href="index.html" class="btn-primary">
        <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
          <path d="M14 5H2M6 1L2 5L6 9" stroke="white" stroke-width="1.2"/>
        </svg>
        トップに戻る
      </a>
      <a href="index.html#works" class="btn-secondary">
        作品を見る
        <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
          <path d="M0 5H10M6 1l4 4-4 4" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </a>
    </div>

    <div class="thanks-divider"></div>
    <p class="thanks-sign">tomo design link</p>

  </div>
</main>

<!-- FOOTER -->
<footer>
  © 2026 tomo design link. All rights reserved.
</footer>

</body>
</html>
